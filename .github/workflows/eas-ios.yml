# Submits EAS iOS builds from GitHub (Linux runner — avoids Windows EPERM on upload).
# Requires repo secret: EXPO_TOKEN (https://expo.dev/account → Access tokens)
#
# One-time setup (approval before EAS spends a credit):
#   Repo → Settings → Environments → New environment name: eas-build
#   → Required reviewers → add yourself (and anyone else who may approve).
#   Until you approve a pending deployment, the job does not run (no npm ci / no eas submit).
#   If the environment does not exist yet, create it before relying on the gate.

name: EAS iOS build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: EAS profile (eas.json)
        required: true
        default: production
        type: choice
        options:
          - production
          - production_xcode26
          - preview

concurrency:
  group: eas-ios-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # Wait for GitHub deployment approval (see eas-build environment) before any step runs.
    environment: eas-build
    # Push → production (TestFlight). Manual → chosen profile. Put [skip-eas] in the commit message ONLY when you want to skip (docs-only).
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip-eas]') }}
    runs-on: ubuntu-latest
    # Opt into Node 24 for actions that still bundle a JS runtime (see GitHub Actions Node deprecation).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EAS_PROFILE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Expo authentication
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "::error::Repository secret EXPO_TOKEN is missing or empty. GitHub → Settings → Secrets and variables → Actions → New repository secret."
            exit 1
          fi
          if ! npx eas-cli@latest whoami; then
            echo "::error::eas whoami failed — regenerate EXPO_TOKEN at expo.dev (account → Access tokens) and update the repo secret."
            exit 1
          fi

      - name: Submit iOS build to EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          LOG_FILE="$(mktemp)"
          set +e
          set -o pipefail
          npx eas-cli@latest build --platform ios --profile "$EAS_PROFILE" --non-interactive --no-wait 2>&1 | tee "$LOG_FILE"
          EXIT="${PIPESTATUS[0]}"
          set +o pipefail
          set -e
          if [ "$EXIT" -ne 0 ]; then
            echo "### eas build failed — log tail (last 120 lines)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -n 120 "$LOG_FILE" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit "$EXIT"
          fi
