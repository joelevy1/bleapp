# Submits EAS iOS builds from GitHub (Linux runner — avoids Windows EPERM on upload).
# Requires repo secret: EXPO_TOKEN (https://expo.dev/account → Access tokens)

name: EAS iOS build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: EAS profile (eas.json)
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

concurrency:
  group: eas-ios-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # Auto-builds on push use profile "preview" unless you use Run workflow. Skip with "[skip eas]" in commit message.
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip eas]') }}
    runs-on: ubuntu-latest
    # Opt into Node 24 for actions that still bundle a JS runtime (see GitHub Actions Node deprecation).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Submit iOS build to EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx eas-cli@latest build --platform ios --profile "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile || 'preview' }}" --non-interactive --no-wait
